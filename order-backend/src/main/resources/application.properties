# ========== 应用配置 ==========
# 服务端口
server.port=8081

# ========== MySQL 数据源 ==========
# 本地开发连接 localhost:3306；Docker 环境通过环境变量 SPRING_DATASOURCE_URL 覆盖为 mysql:3306
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://192.168.6.102:3306/order_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=root123

# ========== Redis ==========
# 本地开发连接 localhost:6379；Docker 环境通过环境变量 SPRING_DATA_REDIS_HOST 覆盖为 redis
spring.data.redis.host=192.168.6.102
spring.data.redis.port=6381
spring.data.redis.password=123456

# ========== RabbitMQ ==========
# 本地开发连接 localhost:5672；Docker 环境通过环境变量覆盖
spring.rabbitmq.host=192.168.6.102
spring.rabbitmq.port=5673
spring.rabbitmq.username=admin
spring.rabbitmq.password=123456

# ========== MyBatis ==========
# Mapper XML 文件位置
mybatis.mapper-locations=classpath:mapper/*.xml
# 实体类别名包
mybatis.type-aliases-package=com.atguigu.order.bean
# 开启驼峰命名自动映射（数据库 create_time → Java createTime）
mybatis.configuration.map-underscore-to-camel-case=true

# ========== JWT ==========
# JWT 签名密钥（生产环境应通过环境变量注入，此处为开发默认值）
jwt.secret=order-jwt-secret-2024-order-jwt-secret-2024
# JWT 有效期（毫秒），默认 24 小时
jwt.expiration=86400000

# ========== 日志 ==========
logging.level.com.atguigu.order=debug
